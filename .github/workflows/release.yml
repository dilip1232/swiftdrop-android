name: Release APK

on:
  pull_request:
    types: [closed]
    branches: [main]
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/'))
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            BRANCH="${{ github.event.pull_request.head.ref }}"
            VERSION="${BRANCH#release/}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -keystore release-keystore.jks \
            -alias swiftdrop \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD || 'swiftdrop123' }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD || 'swiftdrop123' }}" \
            -dname "CN=SwiftDrop, OU=Dev, O=SwiftDrop, L=Unknown, ST=Unknown, C=US"

      - name: Set version from tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION="${VERSION#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          sed -i "s/versionCode = .*/versionCode = $CODE/" app/build.gradle.kts
          sed -i "s/versionName = .*/versionName = \"$VERSION\"/" app/build.gradle.kts
          echo "Set versionName=$VERSION versionCode=$CODE"

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pswiftdrop.storeFile="$(pwd)/release-keystore.jks" \
            -Pswiftdrop.storePassword="${{ secrets.KEYSTORE_PASSWORD || 'swiftdrop123' }}" \
            -Pswiftdrop.keyAlias=swiftdrop \
            -Pswiftdrop.keyPassword="${{ secrets.KEYSTORE_PASSWORD || 'swiftdrop123' }}"

      - name: Rename APK with version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION="${VERSION#v}"
          cp app/build/outputs/apk/release/app-release.apk SwiftDrop-${VERSION}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body: ${{ github.event.pull_request.body || '' }}
          generate_release_notes: ${{ github.event_name == 'push' }}
          files: SwiftDrop-*.apk
