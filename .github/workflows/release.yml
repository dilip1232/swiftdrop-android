name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -keystore release-keystore.jks \
            -alias swiftdrop \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD || 'swiftdrop123' }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD || 'swiftdrop123' }}" \
            -dname "CN=SwiftDrop, OU=Dev, O=SwiftDrop, L=Unknown, ST=Unknown, C=US"

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          sed -i "s/versionCode = .*/versionCode = $CODE/" app/build.gradle.kts
          sed -i "s/versionName = .*/versionName = \"$VERSION\"/" app/build.gradle.kts
          echo "Set versionName=$VERSION versionCode=$CODE"

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pswiftdrop.storeFile="$(pwd)/release-keystore.jks" \
            -Pswiftdrop.storePassword="${{ secrets.KEYSTORE_PASSWORD || 'swiftdrop123' }}" \
            -Pswiftdrop.keyAlias=swiftdrop \
            -Pswiftdrop.keyPassword="${{ secrets.KEYSTORE_PASSWORD || 'swiftdrop123' }}"

      - name: Rename APK with version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp app/build/outputs/apk/release/app-release.apk SwiftDrop-${VERSION}.apk

      - name: Get changelog from PR
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BODY=$(gh pr list --base main --head "release/${VERSION}" --state merged --json body --jq '.[0].body' || echo "")
          if [ -z "$BODY" ]; then
            BODY="Release ${VERSION}"
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: SwiftDrop-*.apk
