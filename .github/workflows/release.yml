name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -keystore release-keystore.jks \
            -alias swiftdrop \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD || 'swiftdrop123' }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD || 'swiftdrop123' }}" \
            -dname "CN=SwiftDrop, OU=Dev, O=SwiftDrop, L=Unknown, ST=Unknown, C=US"

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pswiftdrop.storeFile="$(pwd)/release-keystore.jks" \
            -Pswiftdrop.storePassword="${{ secrets.KEYSTORE_PASSWORD || 'swiftdrop123' }}" \
            -Pswiftdrop.keyAlias=swiftdrop \
            -Pswiftdrop.keyPassword="${{ secrets.KEYSTORE_PASSWORD || 'swiftdrop123' }}"

      - name: Rename APK with version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp app/build/outputs/apk/release/app-release.apk SwiftDrop-${VERSION}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: SwiftDrop-*.apk
